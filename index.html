<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Scene</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: pointer; }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }
  #overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    pointer-events: all;
  }
  #overlay.hidden { display: none; }
  #gameOverText {
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 42px;
    font-weight: 900;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    letter-spacing: 2px;
  }
  #scoreDisplay {
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-shadow: 2px 2px 0 #000;
  }
  #startBtn {
    background: #f5a623;
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 14px 48px;
    font-size: 22px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 6px 0 #c47a0a, 0 8px 16px rgba(0,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  #startBtn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #c47a0a;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="overlay">
    <div id="gameOverText" class="hidden">GAME OVER</div>
    <div id="scoreDisplay" class="hidden"></div>
    <button id="startBtn">START</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Sound effects
const sounds = {
  flap:      new Audio('assets/sounds/flap.mp3'),
  die:       new Audio('assets/sounds/die.mp3'),
  mainTheme: new Audio('assets/sounds/MainTheme.mp3')
};
sounds.mainTheme.loop   = true;
sounds.mainTheme.volume = 0.5;
sounds.flap.volume      = 0.7;
sounds.die.volume       = 0.8;

function playSound(snd) {
  snd.currentTime = 0;
  snd.play().catch(() => {});
}

canvas.width = 400;
canvas.height = 600;

const ui = document.getElementById('ui');

function resize() {
  const vh = window.innerHeight, vw = window.innerWidth;
  const aspect = 400 / 600;
  let w = vh * aspect, h = vh;
  if (w > vw) { w = vw; h = vw / aspect; }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ui.style.width = w + 'px';
  ui.style.height = h + 'px';
  ui.style.left = ((vw - w) / 2) + 'px';
  ui.style.top = ((vh - h) / 2) + 'px';
}
resize();
window.addEventListener('resize', resize);

const GROUND_Y = canvas.height - 80;

const spriteSheet = new Image();
let spriteLoaded = false;
spriteSheet.onload = () => spriteLoaded = true;
spriteSheet.src = 'assets/images/flappybirdassets.png';

let bgX = 0;
const bgSpeed = 0.3;
const backgroundSprite = { x: 0, y: 0, width: 144, height: 256 };

let groundX = 0;
const groundSprite = { x: 146, y: 0, width: 154, height: 56 };

const bird = {
  width: 40, height: 30,
  x: canvas.width / 2 - 20,
  y: canvas.height * 0.35,
  velocity: 0,
  gravity: 0.25,
  jumpStrength: -6,
  rotation: 0,
  currentFrame: 0,
  lastFrameTime: 0,
  frameInterval: 100,
  frames: [
    { x: 223, y: 124, width: 17, height: 12 },
    { x: 264, y: 90,  width: 17, height: 12 },
    { x: 264, y: 64,  width: 17, height: 12 }
  ],
  getBounds() {
    const pad = 5;
    return {
      x: this.x + pad,
      y: this.y + pad,
      width: this.width - pad * 2,
      height: this.height - pad * 2
    };
  }
};

const pipeSprites = {
  top:    { x: 302, y: 0, width: 26, height: 135 },
  bottom: { x: 330, y: 0, width: 26, height: 121 }
};

const PIPE_WIDTH = 70;
const PIPE_GAP = 160;
const PIPE_SPEED = 1.5;
const PIPE_INTERVAL = 1800;

let pipes = [];
let lastPipeTime = 0;
let score = 0;

// 'start' | 'playing' | 'dead'
let gameState = 'start';

function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function spawnPipe() {
  const minTop = 80;
  const maxTop = canvas.height - PIPE_GAP - 180;
  const topHeight = getRandomInt(minTop, maxTop);
  const vy = score >= 20 ? (Math.random() < 0.5 ? 1 : -1) * (1 + Math.random() * 1.5) : 0;
  pipes.push({ x: canvas.width, topHeight, bottomY: topHeight + PIPE_GAP, width: PIPE_WIDTH, scored: false, vy });
}

function updatePipes(currentTime) {
  if (currentTime - lastPipeTime > PIPE_INTERVAL) { spawnPipe(); lastPipeTime = currentTime; }
  const minTop = 60;
  const maxTop = canvas.height - PIPE_GAP - 160;
  pipes.forEach(p => {
    p.x -= PIPE_SPEED;
    if (score >= 20 && p.vy === 0) {
      p.vy = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.random() * 1.5);
    }
    if (score >= 20 && p.vy !== 0) {
      p.topHeight += p.vy;
      if (p.topHeight <= minTop) { p.topHeight = minTop; p.vy = Math.abs(p.vy); }
      if (p.topHeight >= maxTop) { p.topHeight = maxTop; p.vy = -Math.abs(p.vy); }
      p.bottomY = p.topHeight + PIPE_GAP;
    }
  });
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
}

function checkCollision() {
  const pad = 5;
  const bx1 = bird.x + pad, bx2 = bird.x + bird.width - pad;
  const by1 = bird.y + pad, by2 = bird.y + bird.height - pad;
  for (const p of pipes) {
    if (bx2 > p.x && bx1 < p.x + PIPE_WIDTH) {
      if (by1 < p.topHeight || by2 > p.bottomY) return true;
    }
  }
  return false;
}

function checkScore() {
  for (const p of pipes) {
    if (!p.scored && p.x + PIPE_WIDTH < bird.x) { p.scored = true; score++; }
  }
}

function drawPipes() {
  pipes.forEach(p => {
    const pipeX = Math.round(p.x), pipeW = Math.round(PIPE_WIDTH);
    if (spriteLoaded) {
      const capH = 12;
      const topSpr = pipeSprites.top, btmSpr = pipeSprites.bottom;

      const topBodySrcH = topSpr.height - capH;
      const topBodyDrawH = Math.round(p.topHeight - capH);
      if (topBodyDrawH > 0) {
        for (let y = 0; y < topBodyDrawH; y += topBodySrcH) {
          const h = Math.min(topBodySrcH, topBodyDrawH - y);
          ctx.drawImage(spriteSheet, topSpr.x, topSpr.y, topSpr.width, h, pipeX, Math.round(y), pipeW, Math.round(h));
        }
      }
      ctx.drawImage(spriteSheet, topSpr.x, topSpr.y + topSpr.height - capH, topSpr.width, capH, pipeX - 3, Math.round(p.topHeight - capH), pipeW + 6, capH);

      const bottomY = Math.round(p.bottomY);
      ctx.drawImage(spriteSheet, btmSpr.x, btmSpr.y, btmSpr.width, capH, pipeX - 3, bottomY, pipeW + 6, capH);
      const btmBodySrcH = btmSpr.height - capH;
      const btmBodyStartY = bottomY + capH;
      const btmBodyDrawH = Math.round(canvas.height - btmBodyStartY);
      if (btmBodyDrawH > 0) {
        for (let y = 0; y < btmBodyDrawH; y += btmBodySrcH) {
          const h = Math.min(btmBodySrcH, btmBodyDrawH - y);
          ctx.drawImage(spriteSheet, btmSpr.x, btmSpr.y + capH, btmSpr.width, h, pipeX, Math.round(btmBodyStartY + y), pipeW, Math.round(h));
        }
      }
    } else {
      ctx.fillStyle = '#73BF2E';
      ctx.fillRect(pipeX, 0, pipeW, p.topHeight);
      ctx.fillStyle = '#8BC34A';
      ctx.fillRect(pipeX - 5, p.topHeight - 30, pipeW + 10, 30);
      ctx.fillStyle = '#73BF2E';
      ctx.fillRect(pipeX, p.bottomY, pipeW, canvas.height - p.bottomY);
      ctx.fillStyle = '#8BC34A';
      ctx.fillRect(pipeX - 5, p.bottomY, pipeW + 10, 30);
    }
  });
}

function drawScore() {
  if (gameState !== 'playing') return;
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.strokeText(score, canvas.width / 2, 60);
  ctx.fillText(score, canvas.width / 2, 60);
  ctx.restore();
}

function showStartUI() {
  document.getElementById('gameOverText').classList.add('hidden');
  document.getElementById('scoreDisplay').classList.add('hidden');
  document.getElementById('startBtn').textContent = 'START';
  document.getElementById('overlay').classList.remove('hidden');
}

function showGameOverUI() {
  document.getElementById('gameOverText').classList.remove('hidden');
  const sd = document.getElementById('scoreDisplay');
  sd.textContent = 'Score: ' + score;
  sd.classList.remove('hidden');
  document.getElementById('startBtn').textContent = 'RESTART';
  document.getElementById('overlay').classList.remove('hidden');
}

function hideUI() {
  document.getElementById('overlay').classList.add('hidden');
}

function startGame() {
  bird.x = canvas.width / 2 - 20;
  bird.y = canvas.height * 0.35;
  bird.velocity = bird.jumpStrength;
  bird.rotation = 0;
  bird.currentFrame = 0;
  pipes = [];
  lastPipeTime = 0;
  score = 0;
  bgX = 0;
  groundX = 0;
  gameState = 'playing';
  hideUI();
  sounds.die.pause();
  sounds.die.currentTime = 0;
  playSound(sounds.mainTheme);

  // Reset rocket system
  rocketSystem.reset();
}

function triggerGameOver() {
  if (gameState !== 'playing') return;
  gameState = 'dead';
  bird.velocity = -3;
  sounds.mainTheme.pause();
  sounds.mainTheme.currentTime = 0;
  playSound(sounds.die);
  showGameOverUI();
}

function flap() {
  if (gameState === 'playing') {
    bird.velocity = bird.jumpStrength;
    playSound(sounds.flap);
  }
}

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
document.getElementById('startBtn').addEventListener('click', (e) => { e.stopPropagation(); startGame(); });
document.getElementById('startBtn').addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); startGame(); }, { passive: false });

function drawBackground() {
  ctx.fillStyle = '#70c5ce';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (spriteLoaded) {
    const cropY = 60, cropH = 150, scale = 2.7;
    const scaledW = backgroundSprite.width * scale;
    const scaledH = cropH * scale;
    const bgY = GROUND_Y - scaledH;
    const tiles = Math.ceil(canvas.width / scaledW) + 2;
    for (let i = 0; i < tiles; i++) {
      ctx.drawImage(spriteSheet, backgroundSprite.x, backgroundSprite.y + cropY, backgroundSprite.width, cropH,
        bgX * scale + i * scaledW, bgY, scaledW, scaledH);
    }
  }
}

function drawGround() {
  if (spriteLoaded) {
    const tiles = Math.ceil(canvas.width / groundSprite.width) + 1;
    for (let i = 0; i < tiles; i++) {
      ctx.drawImage(spriteSheet, groundSprite.x, groundSprite.y, groundSprite.width, groundSprite.height,
        Math.round(groundX + i * groundSprite.width), Math.round(GROUND_Y), groundSprite.width, 80);
    }
  } else {
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, GROUND_Y, canvas.width, 15);
  }
}

function drawBird(currentTime) {
  if (currentTime - bird.lastFrameTime > bird.frameInterval) {
    bird.currentFrame = (bird.currentFrame + 1) % bird.frames.length;
    bird.lastFrameTime = currentTime;
  }
  ctx.save();
  ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
  ctx.rotate((bird.rotation * Math.PI) / 180);
  if (spriteLoaded) {
    const frame = bird.frames[bird.currentFrame];
    ctx.drawImage(spriteSheet, frame.x, frame.y, frame.width, frame.height,
      -bird.width / 2, -bird.height / 2, bird.width, bird.height);
  } else {
    ctx.fillStyle = '#f4d03f';
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  ROCKET SYSTEM (referenced from user's code)
// ─────────────────────────────────────────────

class Rocket {
  constructor(canvas, rocketImage, imageLoaded, customY = null, customSpeed = null, customXOffset = 0) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.rocketImage = rocketImage;
    this.imageLoaded = imageLoaded;
    this.width = 45;
    this.height = 56;
    this.x = canvas.width + this.width + customXOffset;
    if (customY !== null) {
      this.y = customY;
    } else {
      const minY = 60;
      const maxY = canvas.height - 140;
      this.y = minY + Math.random() * (maxY - minY);
    }
    this.speed = customSpeed !== null ? customSpeed : (1.5 + Math.random() * 1);
    this.sprite = { x: 138, y: 50, width: 224, height: 400 };
    this.trail = [];
    this.trailTimer = 0;
    this.warningAlpha = 1;
    this.warningPhase = 0;
    this.showWarning = true;
    this.warningDuration = 800;
    this.spawnTime = Date.now();
    this.velocityY = 0;
    this.affectedByGravity = false;
    this.gravityStrength = 0.5;
    this.rotation = 0;
  }

  applyGravity() {
    this.affectedByGravity = true;
    this.velocityY = 0;
  }

  update() {
    const elapsed = Date.now() - this.spawnTime;
    if (elapsed < this.warningDuration) {
      this.showWarning = true;
      this.warningPhase += 0.15;
      this.warningAlpha = 0.5 + Math.sin(this.warningPhase) * 0.5;
      return;
    }
    this.showWarning = false;
    this.x -= this.speed;
    if (this.affectedByGravity) {
      this.velocityY += this.gravityStrength;
      this.y += this.velocityY;
      this.rotation += 0.1;
      this.speed *= 0.98;
    }
    this.trailTimer++;
    if (this.trailTimer % 2 === 0) {
      this.trail.push({
        x: this.x + this.width,
        y: this.y + this.height / 2 + (Math.random() - 0.5) * 8,
        size: 3 + Math.random() * 4,
        alpha: 0.8,
        life: 15 + Math.random() * 10,
        maxLife: 25,
        vx: 1 + Math.random() * 2,
        vy: (Math.random() - 0.5) * 1.5
      });
    }
    for (let i = this.trail.length - 1; i >= 0; i--) {
      const p = this.trail[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      p.alpha = Math.max(0, p.life / p.maxLife) * 0.8;
      p.size *= 0.95;
      if (p.life <= 0) this.trail.splice(i, 1);
    }
  }

  draw() {
    const ctx = this.ctx;
    if (this.showWarning) {
      ctx.save();
      ctx.globalAlpha = this.warningAlpha;
      const warningX = this.canvas.width - 30;
      const warningY = this.y + this.height / 2;
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.moveTo(warningX + 15, warningY);
      ctx.lineTo(warningX, warningY - 10);
      ctx.lineTo(warningX, warningY + 10);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('!', warningX - 8, warningY + 5);
      ctx.restore();
      return;
    }
    for (const p of this.trail) {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = '#FFA500';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
    if (this.affectedByGravity) {
      ctx.rotate(-Math.PI / 2 + this.rotation);
    } else {
      ctx.rotate(-Math.PI / 2);
    }
    if (this.imageLoaded && this.rocketImage) {
      ctx.drawImage(this.rocketImage, this.sprite.x, this.sprite.y, this.sprite.width, this.sprite.height,
        -this.width / 2, -this.height / 2, this.width, this.height);
    } else {
      this._drawFallback(ctx);
    }
    ctx.restore();
  }

  _drawFallback(ctx) {
    // Rocket body
    ctx.fillStyle = '#CC0000';
    ctx.beginPath();
    ctx.ellipse(0, 0, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.moveTo(this.width / 2, 0);
    ctx.lineTo(this.width / 2 - 10, -this.height / 2 + 2);
    ctx.lineTo(this.width / 2 - 10, this.height / 2 - 2);
    ctx.closePath();
    ctx.fill();
    // Fins
    ctx.fillStyle = '#990000';
    ctx.beginPath();
    ctx.moveTo(-this.width / 2, -this.height / 2);
    ctx.lineTo(-this.width / 2 - 6, -this.height / 2 - 5);
    ctx.lineTo(-this.width / 2 + 5, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-this.width / 2, this.height / 2);
    ctx.lineTo(-this.width / 2 - 6, this.height / 2 + 5);
    ctx.lineTo(-this.width / 2 + 5, 0);
    ctx.closePath();
    ctx.fill();
    // Flame
    ctx.fillStyle = '#FFA500';
    ctx.beginPath();
    ctx.moveTo(-this.width / 2, -4);
    ctx.lineTo(-this.width / 2 - 12 - Math.random() * 5, 0);
    ctx.lineTo(-this.width / 2, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath();
    ctx.moveTo(-this.width / 2, -2);
    ctx.lineTo(-this.width / 2 - 8 - Math.random() * 3, 0);
    ctx.lineTo(-this.width / 2, 2);
    ctx.closePath();
    ctx.fill();
    // Window
    ctx.fillStyle = '#87CEEB';
    ctx.beginPath();
    ctx.arc(5, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.stroke();
  }

  getBounds() {
    return { x: this.x + 4, y: this.y + 2, width: this.width - 8, height: this.height - 4 };
  }

  isOffScreen() {
    return this.x + this.width < -20 || this.y > this.canvas.height + 50;
  }

  isActive() {
    return (Date.now() - this.spawnTime) >= this.warningDuration;
  }
}

class RocketSystem {
  constructor() {
    this.canvas = null;
    this.ctx = null;
    this.rockets = [];
    this.explosions = [];
    this.scoreThreshold = 10;
    this.nextWaveScore = 10;
    this.formationsPerWave = 3;
    this.formationsSpawnedInWave = 0;
    this.waveActive = false;
    this.minSpawnInterval = 15000;
    this.maxSpawnInterval = 20000;
    this.lastSpawnTime = 0;
    this.nextSpawnDelay = 0;
    this.spriteLoaded = false;
    this.rocketImage = new Image();
    this.rocketImage.onload = () => { this.spriteLoaded = true; };
    this.rocketImage.onerror = () => {};
    this.rocketImage.src = 'assets/images/rocket.png';
  }

  init(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
  }

  update(score) {
    const now = Date.now();
    if (!this.waveActive && score >= this.nextWaveScore) this._startWave();
    if (this.waveActive && this.formationsSpawnedInWave < this.formationsPerWave) {
      if (now - this.lastSpawnTime >= this.nextSpawnDelay) {
        this._spawnFormation();
        this.lastSpawnTime = now;
        this.formationsSpawnedInWave++;
        this.nextSpawnDelay = this.minSpawnInterval + Math.random() * (this.maxSpawnInterval - this.minSpawnInterval);
        if (this.formationsSpawnedInWave >= this.formationsPerWave) this._endWave();
      }
    }
    for (let i = this.rockets.length - 1; i >= 0; i--) {
      this.rockets[i].update();
      if (this.rockets[i].isOffScreen()) this.rockets.splice(i, 1);
    }
    this._updateExplosions();
  }

  _startWave() {
    this.waveActive = true;
    this.formationsSpawnedInWave = 0;
    this.lastSpawnTime = Date.now();
    this.nextSpawnDelay = 2000 + Math.random() * 3000;
  }

  _endWave() {
    this.waveActive = false;
    this.nextWaveScore += 10;
  }

  _spawnFormation() {
    const rocketHeight = 56;
    const gapHeight = 150;
    const topMargin = 60;
    const bottomMargin = 140;
    const playableHeight = this.canvas.height - topMargin - bottomMargin;
    const zoneHeight = (playableHeight - gapHeight) / 3;
    const gapPosition = Math.random() < 0.5 ? 1 : 2;
    const formationSpeed = 1.8 + Math.random() * 0.7;
    const xOffsets = [0, 100 + Math.random() * 50, 220 + Math.random() * 80];
    for (let i = xOffsets.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [xOffsets[i], xOffsets[j]] = [xOffsets[j], xOffsets[i]];
    }
    let yPositions = [];
    if (gapPosition === 1) {
      yPositions.push(topMargin + Math.random() * 30);
      yPositions.push(topMargin + zoneHeight + gapHeight + Math.random() * 30);
      yPositions.push(this.canvas.height - bottomMargin - rocketHeight - Math.random() * 30);
    } else {
      yPositions.push(topMargin + Math.random() * 30);
      yPositions.push(topMargin + zoneHeight + Math.random() * 30);
      yPositions.push(this.canvas.height - bottomMargin - rocketHeight - Math.random() * 30);
    }
    for (let i = 0; i < 3; i++) {
      this.rockets.push(new Rocket(this.canvas, this.rocketImage, this.spriteLoaded, yPositions[i], formationSpeed, xOffsets[i]));
    }
  }

  checkCollision(bird) {
    const bb = bird.getBounds();
    for (let i = 0; i < this.rockets.length; i++) {
      const r = this.rockets[i];
      if (!r.isActive()) continue;
      const rb = r.getBounds();
      if (bb.x < rb.x + rb.width && bb.x + bb.width > rb.x &&
          bb.y < rb.y + rb.height && bb.y + bb.height > rb.y) {
        this._spawnExplosion(r.x + r.width / 2, r.y + r.height / 2);
        this.rockets.splice(i, 1);
        return true;
      }
    }
    return false;
  }

  _spawnExplosion(x, y) {
    const colors = ['#FF4500', '#FFA500', '#FFD700', '#FF0000', '#FFFF00'];
    const explosion = { particles: [], flashAlpha: 1, flashTimer: 10, x, y };
    for (let i = 0; i < 20; i++) {
      const angle = (Math.PI * 2 / 20) * i;
      const speed = 2 + Math.random() * 5;
      explosion.particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        size: 3 + Math.random() * 4, alpha: 1, life: 30, maxLife: 30,
        color: colors[i % colors.length], gravity: 0.08, decay: 0.96 });
    }
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI * 2 / 6) * i;
      explosion.particles.push({ x, y, vx: Math.cos(angle) * 1.5, vy: Math.sin(angle) * 1.5,
        size: 10, alpha: 0.5, life: 40, maxLife: 40, color: '#555555', gravity: -0.02, decay: 0.97 });
    }
    explosion.shockwave = { x, y, radius: 5, maxRadius: 80, alpha: 0.8, speed: 4 };
    this.explosions.push(explosion);
  }

  _updateExplosions() {
    for (let e = this.explosions.length - 1; e >= 0; e--) {
      const exp = this.explosions[e];
      if (exp.flashTimer > 0) { exp.flashTimer--; exp.flashAlpha = exp.flashTimer / 10; }
      if (exp.shockwave) {
        exp.shockwave.radius += exp.shockwave.speed;
        exp.shockwave.alpha *= 0.92;
        if (exp.shockwave.radius >= exp.shockwave.maxRadius) exp.shockwave = null;
      }
      let allDead = true;
      for (let i = exp.particles.length - 1; i >= 0; i--) {
        const p = exp.particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
        p.vx *= p.decay; p.vy *= p.decay; p.life--;
        p.alpha = Math.max(0, p.life / p.maxLife); p.size *= 0.98;
        if (p.life <= 0) exp.particles.splice(i, 1);
        else allDead = false;
      }
      if (allDead && exp.flashTimer <= 0 && !exp.shockwave) this.explosions.splice(e, 1);
    }
  }

  draw() {
    const ctx = this.ctx;
    if (!ctx) return;
    for (const r of this.rockets) r.draw();
    for (const exp of this.explosions) {
      if (exp.flashTimer > 0) {
        ctx.save(); ctx.globalAlpha = exp.flashAlpha * 0.3;
        ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        ctx.restore();
      }
      if (exp.shockwave) {
        const sw = exp.shockwave;
        ctx.save(); ctx.globalAlpha = sw.alpha; ctx.strokeStyle = '#FFA500'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
      }
      for (const p of exp.particles) {
        ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  reset() {
    this.rockets = [];
    this.explosions = [];
    this.lastSpawnTime = 0;
    this.nextWaveScore = this.scoreThreshold;
    this.formationsSpawnedInWave = 0;
    this.waveActive = false;
    this.nextSpawnDelay = 0;
  }
}

// ── Init rocket system ──
const rocketSystem = new RocketSystem();
rocketSystem.init(canvas);

// ── Show start UI ──
showStartUI();

function loop(currentTime) {
  // Scrolling
  if (gameState === 'playing') {
    bgX -= bgSpeed;
    if (bgX <= -backgroundSprite.width) bgX = 0;
    groundX -= 1.5;
    if (groundX <= -20) groundX = 0;
  }

  if (gameState === 'playing') {
    bird.velocity += bird.gravity;
    if (bird.velocity > 8) bird.velocity = 8;
    bird.y += bird.velocity;
    bird.rotation = Math.min(Math.max(bird.velocity * 5, -30), 90);

    if (bird.y < 0) { bird.y = 0; bird.velocity = 0; }
    if (bird.y + bird.height >= GROUND_Y) { bird.y = GROUND_Y - bird.height; triggerGameOver(); }

    updatePipes(currentTime);
    checkScore();
    if (checkCollision()) { triggerGameOver(); }

    // Update & collision-check rockets
    rocketSystem.update(score);
    if (rocketSystem.checkCollision(bird)) { triggerGameOver(); }
  }

  if (gameState === 'dead') {
    bird.velocity += bird.gravity;
    if (bird.velocity > 10) bird.velocity = 10;
    bird.y += bird.velocity;
    bird.rotation = 90;
    if (bird.y + bird.height >= GROUND_Y) bird.y = GROUND_Y - bird.height;
    // Keep updating explosions while dead so they finish animating
    rocketSystem.update(score);
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawPipes();
  // Draw rockets between pipes and ground so ground renders on top
  rocketSystem.draw();
  drawGround();
  drawBird(currentTime);
  drawScore();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
