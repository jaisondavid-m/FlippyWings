<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Scene</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: pointer; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

canvas.width = 400;
canvas.height = 600;

function resize() {
  const vh = window.innerHeight, vw = window.innerWidth;
  const aspect = 400 / 600;
  let w = vh * aspect, h = vh;
  if (w > vw) { w = vw; h = vw / aspect; }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

const GROUND_Y = canvas.height - 80;

// Shared sprite sheet
const spriteSheet = new Image();
let spriteLoaded = false;
spriteSheet.onload = () => spriteLoaded = true;
spriteSheet.src = 'assets/images/flappybirdassets.png';

// Background
let bgX = 0;
const bgSpeed = 0.3;
const backgroundSprite = { x: 0, y: 0, width: 144, height: 256 };

// Ground
let groundX = 0;
const groundSprite = { x: 146, y: 0, width: 154, height: 56 };

// Bird
const bird = {
  width: 40,
  height: 30,
  x: canvas.width / 2 - 20,
  y: canvas.height * 0.35,
  velocity: 0,
  gravity: 0.25,
  jumpStrength: -6,
  rotation: 0,
  currentFrame: 0,
  lastFrameTime: 0,
  frameInterval: 100,
  frames: [
    { x: 223, y: 124, width: 17, height: 12 },
    { x: 264, y: 90,  width: 17, height: 12 },
    { x: 264, y: 64,  width: 17, height: 12 }
  ]
};

// Pipe sprites (from reference)
const pipeSprites = {
  top:    { x: 302, y: 0, width: 26, height: 135 },
  bottom: { x: 330, y: 0, width: 26, height: 121 }
};

// Pipes
const PIPE_WIDTH = 70;
const PIPE_GAP = 160;
const PIPE_SPEED = 1.5;
const PIPE_INTERVAL = 1800; // ms

let pipes = [];
let lastPipeTime = 0;

function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function spawnPipe() {
  const minTop = 80;
  const maxTop = canvas.height - PIPE_GAP - 180;
  const topHeight = getRandomInt(minTop, maxTop);
  pipes.push({
    x: canvas.width,
    topHeight: topHeight,
    bottomY: topHeight + PIPE_GAP,
    width: PIPE_WIDTH
  });
}

function updatePipes(currentTime) {
  if (currentTime - lastPipeTime > PIPE_INTERVAL) {
    spawnPipe();
    lastPipeTime = currentTime;
  }
  pipes.forEach(p => p.x -= PIPE_SPEED);
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);
}

function drawPipes() {
  pipes.forEach(p => {
    const pipeX = Math.round(p.x);
    const pipeW = Math.round(PIPE_WIDTH);

    if (spriteLoaded) {
      const capH = 12;
      const topSpr = pipeSprites.top;
      const btmSpr = pipeSprites.bottom;

      // --- Top pipe ---
      const topBodySrcH = topSpr.height - capH;
      const topBodyDrawH = Math.round(p.topHeight - capH);
      if (topBodyDrawH > 0) {
        for (let y = 0; y < topBodyDrawH; y += topBodySrcH) {
          const h = Math.min(topBodySrcH, topBodyDrawH - y);
          ctx.drawImage(spriteSheet,
            topSpr.x, topSpr.y, topSpr.width, h,
            pipeX, Math.round(y), pipeW, Math.round(h)
          );
        }
      }
      // Top cap
      ctx.drawImage(spriteSheet,
        topSpr.x, topSpr.y + topSpr.height - capH, topSpr.width, capH,
        pipeX - 3, Math.round(p.topHeight - capH), pipeW + 6, capH
      );

      // --- Bottom pipe ---
      const bottomY = Math.round(p.bottomY);
      // Bottom cap
      ctx.drawImage(spriteSheet,
        btmSpr.x, btmSpr.y, btmSpr.width, capH,
        pipeX - 3, bottomY, pipeW + 6, capH
      );
      // Bottom body
      const btmBodySrcH = btmSpr.height - capH;
      const btmBodyStartY = bottomY + capH;
      const btmBodyDrawH = Math.round(canvas.height - btmBodyStartY);
      if (btmBodyDrawH > 0) {
        for (let y = 0; y < btmBodyDrawH; y += btmBodySrcH) {
          const h = Math.min(btmBodySrcH, btmBodyDrawH - y);
          ctx.drawImage(spriteSheet,
            btmSpr.x, btmSpr.y + capH, btmSpr.width, h,
            pipeX, Math.round(btmBodyStartY + y), pipeW, Math.round(h)
          );
        }
      }

    } else {
      // Fallback pipes
      ctx.fillStyle = '#73BF2E';
      ctx.fillRect(pipeX, 0, pipeW, p.topHeight);
      ctx.fillStyle = '#8BC34A';
      ctx.fillRect(pipeX - 5, p.topHeight - 30, pipeW + 10, 30);

      ctx.fillStyle = '#73BF2E';
      ctx.fillRect(pipeX, p.bottomY, pipeW, canvas.height - p.bottomY);
      ctx.fillStyle = '#8BC34A';
      ctx.fillRect(pipeX - 5, p.bottomY, pipeW + 10, 30);
    }
  });
}

// Input
function flap() {
  bird.velocity = bird.jumpStrength;
}
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

function drawBackground() {
  ctx.fillStyle = '#70c5ce';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (spriteLoaded) {
    const cropY = 60, cropH = 150;
    const scale = 2.7;
    const scaledW = backgroundSprite.width * scale;
    const scaledH = cropH * scale;
    const bgY = GROUND_Y - scaledH;
    const tiles = Math.ceil(canvas.width / scaledW) + 2;
    for (let i = 0; i < tiles; i++) {
      ctx.drawImage(spriteSheet,
        backgroundSprite.x, backgroundSprite.y + cropY,
        backgroundSprite.width, cropH,
        bgX * scale + i * scaledW, bgY,
        scaledW, scaledH
      );
    }
  }
}

function drawGround() {
  if (spriteLoaded) {
    const tiles = Math.ceil(canvas.width / groundSprite.width) + 1;
    for (let i = 0; i < tiles; i++) {
      ctx.drawImage(spriteSheet,
        groundSprite.x, groundSprite.y,
        groundSprite.width, groundSprite.height,
        Math.round(groundX + i * groundSprite.width), Math.round(GROUND_Y),
        groundSprite.width, 80
      );
    }
  } else {
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, GROUND_Y, canvas.width, 15);
  }
}

function drawBird(currentTime) {
  if (currentTime - bird.lastFrameTime > bird.frameInterval) {
    bird.currentFrame = (bird.currentFrame + 1) % bird.frames.length;
    bird.lastFrameTime = currentTime;
  }
  ctx.save();
  ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
  ctx.rotate((bird.rotation * Math.PI) / 180);
  if (spriteLoaded) {
    const frame = bird.frames[bird.currentFrame];
    ctx.drawImage(spriteSheet,
      frame.x, frame.y, frame.width, frame.height,
      -bird.width / 2, -bird.height / 2,
      bird.width, bird.height
    );
  } else {
    ctx.fillStyle = '#f4d03f';
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(10, -5, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'black';
    ctx.beginPath(); ctx.arc(12, -5, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.moveTo(15, 2); ctx.lineTo(28, 5); ctx.lineTo(15, 10); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function loop(currentTime) {
  // Scroll
  bgX -= bgSpeed;
  if (bgX <= -backgroundSprite.width) bgX = 0;
  groundX -= 1.5;
  if (groundX <= -20) groundX = 0;

  // Bird physics
  bird.velocity += bird.gravity;
  if (bird.velocity > 8) bird.velocity = 8;
  bird.y += bird.velocity;
  if (bird.y + bird.height >= GROUND_Y) { bird.y = GROUND_Y - bird.height; bird.velocity = 0; }
  if (bird.y < 0) { bird.y = 0; bird.velocity = 0; }
  bird.rotation = Math.min(Math.max(bird.velocity * 5, -30), 90);

  // Pipes
  updatePipes(currentTime);

  // Draw
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawPipes();
  drawGround();
  drawBird(currentTime);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
