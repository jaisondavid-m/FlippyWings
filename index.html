<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Scene</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

canvas.width = 400;
canvas.height = 600;

function resize() {
  const vh = window.innerHeight, vw = window.innerWidth;
  const aspect = 400 / 600;
  let w = vh * aspect, h = vh;
  if (w > vw) { w = vw; h = vw / aspect; }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}
resize();
window.addEventListener('resize', resize);

const GROUND_Y = canvas.height - 80;

const spriteSheet = new Image();
let spriteLoaded = false;
spriteSheet.onload = () => spriteLoaded = true;
spriteSheet.src = 'assets/images/flappybirdassets.png';

let bgX = 0;
const bgSpeed = 0.3;
const backgroundSprite = { x: 0, y: 0, width: 144, height: 256 };

let groundX = 0;
const groundSprite = { x: 146, y: 0, width: 154, height: 56 };

const bird = {
  width: 40,
  height: 30,
  x: canvas.width / 2 - 20,
  baseY: canvas.height * 0.35,
  y: canvas.height * 0.35,
  autoFlyTime: 0,
  autoFlySpeed: 0.025,
  autoFlyAmplitude: 18,
  currentFrame: 0,
  lastFrameTime: 0,
  frameInterval: 100,
  frames: [
    { x: 223, y: 124, width: 17, height: 12 },
    { x: 264, y: 90,  width: 17, height: 12 },
    { x: 264, y: 64,  width: 17, height: 12 }
  ]
};

function drawBackground() {
  ctx.fillStyle = '#70c5ce';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (spriteLoaded) {
    const cropY = 60, cropH = 150;
    const scale = 2.7;
    const scaledW = backgroundSprite.width * scale;
    const scaledH = cropH * scale;
    const bgY = GROUND_Y - scaledH;
    const tiles = Math.ceil(canvas.width / scaledW) + 2;
    for (let i = 0; i < tiles; i++) {
      ctx.drawImage(spriteSheet,
        backgroundSprite.x, backgroundSprite.y + cropY,
        backgroundSprite.width, cropH,
        bgX * scale + i * scaledW, bgY,
        scaledW, scaledH
      );
    }
  }
}

function drawGround() {
  if (spriteLoaded) {
    const tiles = Math.ceil(canvas.width / groundSprite.width) + 1;
    for (let i = 0; i < tiles; i++) {
      ctx.drawImage(spriteSheet,
        groundSprite.x, groundSprite.y,
        groundSprite.width, groundSprite.height,
        Math.round(groundX + i * groundSprite.width), Math.round(GROUND_Y),
        groundSprite.width, 80
      );
    }
  } else {
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, GROUND_Y, canvas.width, 15);
  }
}

function drawBird(currentTime) {
  if (currentTime - bird.lastFrameTime > bird.frameInterval) {
    bird.currentFrame = (bird.currentFrame + 1) % bird.frames.length;
    bird.lastFrameTime = currentTime;
  }

  ctx.save();
  ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);

  if (spriteLoaded) {
    const frame = bird.frames[bird.currentFrame];
    ctx.drawImage(spriteSheet,
      frame.x, frame.y, frame.width, frame.height,
      -bird.width / 2, -bird.height / 2,
      bird.width, bird.height
    );
  } else {
    ctx.fillStyle = '#f4d03f';
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(10, -5, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'black';
    ctx.beginPath(); ctx.arc(12, -5, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.moveTo(15, 2); ctx.lineTo(28, 5); ctx.lineTo(15, 10); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function loop(currentTime) {
  bgX -= bgSpeed;
  if (bgX <= -backgroundSprite.width) bgX = 0;
  groundX -= 1.5;
  if (groundX <= -20) groundX = 0;
  bird.autoFlyTime += bird.autoFlySpeed;
  bird.y = bird.baseY + Math.sin(bird.autoFlyTime) * bird.autoFlyAmplitude;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();
  drawGround();
  drawBird(currentTime);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
