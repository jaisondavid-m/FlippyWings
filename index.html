const sheet = new Image();
let sheetReady = false;
sheet.onload = () => { sheetReady = true; };
sheet.src = SHEET_SRC;

// Sprite regions (from 470x293 sheet, identified visually)
// Bird frames — 3 animation frames, each ~34x24
// From visual inspection: bird at x≈228,y≈124 in the sheet
// These are the 3 flap frames of the orange bird in the UI panel area
const BIRD_FRAMES = [
  { sx: 228, sy: 120, sw: 34, sh: 24 },
  { sx: 228, sy: 120, sw: 34, sh: 24 },  // using same for now, animation via y offset
  { sx: 228, sy: 120, sw: 34, sh: 24 },
];

// Pipe sprite: green pipe visible at x≈302, y=0 in sheet
const PIPE = { sx: 302, sy: 0, sw: 52, sh: 160 };
// Pipe cap: slightly wider section at bottom of top pipe / top of bottom pipe
const PIPE_CAP = { sx: 298, sy: 155, sw: 56, sh: 14 };

// Background sky from x=0,y=0 to x=144,y=164
const BG = { sx: 0, sy: 0, sw: 144, sh: 164 };

// Ground: approx x=0,y=210, w=290, h=56
const GROUND = { sx: 0, sy: 210, sw: 289, sh: 56 };

// ── Game constants ───────────────────────────────────────────────────────────
const W = canvas.width;
const H = canvas.height;
const GROUND_Y = H - 80;
const GRAVITY = 0.35;
const JUMP = -7;
const PIPE_W = 52;
const PIPE_GAP = 140;
const PIPE_SPEED = 2.2;

// ── State ────────────────────────────────────────────────────────────────────
let state = 'waiting'; // waiting | playing | dead
let bird, pipes, score, bgX, groundX, frame, frameTimer;

function init() {
  bird = { x: 80, y: H / 2.5, vy: 0, rot: 0, w: 34, h: 24 };
  pipes = [];
  score = 0;
  bgX = 0;
  groundX = 0;
  frame = 0;
  frameTimer = 0;
  state = 'waiting';
}

// ── Input ────────────────────────────────────────────────────────────────────
function jump() {
  if (state === 'waiting') { state = 'playing'; }
  if (state === 'playing') { bird.vy = JUMP; }
  if (state === 'dead') { init(); }
}
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); } });
canvas.addEventListener('pointerdown', jump);

// ── Pipe spawning ─────────────────────────────────────────────────────────────
let pipeTimer = 0;
const PIPE_INTERVAL = 90; // frames

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt) {
  // Animate bird wing
  frameTimer++;
  if (frameTimer > 8) { frame = (frame + 1) % 3; frameTimer = 0; }

  if (state === 'waiting') {
    // Bob up and down
    bird.y = H / 2.5 + Math.sin(Date.now() / 400) * 8;
    bird.rot = 0;
    bgX -= 0.3 * dt;
    groundX -= 1.5 * dt;
    return;
  }

  if (state === 'playing') {
    // Physics
    bird.vy += GRAVITY * dt;
    bird.vy = Math.min(bird.vy, 10);
    bird.y += bird.vy * dt;
    bird.rot = Math.max(-25, Math.min(90, bird.vy * 4));

    // Scroll
    bgX -= 0.5 * dt;
    groundX -= PIPE_SPEED * dt;

    // Pipes
    pipeTimer += dt;
    if (pipeTimer >= PIPE_INTERVAL) {
      pipeTimer = 0;
      const topH = 60 + Math.random() * (GROUND_Y - PIPE_GAP - 100);
      pipes.push({ x: W + 10, topH, scored: false });
    }

    for (let p of pipes) {
      p.x -= PIPE_SPEED * dt;
      // Score
      if (!p.scored && p.x + PIPE_W < bird.x) { p.scored = true; score++; }
      // Collision
      const bx = bird.x + 4, by = bird.y + 4, bw = bird.w - 8, bh = bird.h - 8;
      const pipeLeft = p.x, pipeRight = p.x + PIPE_W;
      const topBottom = p.topH, bottomTop = p.topH + PIPE_GAP;
      if (bx + bw > pipeLeft && bx < pipeRight) {
        if (by < topBottom || by + bh > bottomTop) { die(); }
      }
    }
    // Remove off-screen
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    // Ground / ceiling
    if (bird.y + bird.h >= GROUND_Y || bird.y <= 0) { die(); }
  }

  if (state === 'dead') {
    // Bird falls
    bird.vy += 0.5 * dt;
    bird.y += bird.vy * dt;
    bird.rot = Math.min(90, bird.rot + 5 * dt);
    if (bird.y + bird.h > GROUND_Y) {
      bird.y = GROUND_Y - bird.h;
      bird.vy = 0;
    }
  }
}

function die() {
  state = 'dead';
  bird.vy = -4;
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawBg() {
  if (!sheetReady) {
    ctx.fillStyle = '#70c5ce';
    ctx.fillRect(0, 0, W, GROUND_Y);
    return;
  }
  // Tile the background horizontally
  const bgW = BG.sw * (H / BG.sh);
  const bx = bgX % bgW;
  for (let x = bx - bgW; x < W; x += bgW) {
    ctx.drawImage(sheet, BG.sx, BG.sy, BG.sw, BG.sh, x, 0, bgW, GROUND_Y + 10);
  }
}

function drawGround() {
  if (!sheetReady) {
    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    return;
  }
  const gScale = (H - GROUND_Y) / GROUND.sh;
  const gW = GROUND.sw * gScale;
  const gx = groundX % gW;
  for (let x = gx - gW; x < W; x += gW) {
    ctx.drawImage(sheet, GROUND.sx, GROUND.sy, GROUND.sw, GROUND.sh, x, GROUND_Y, gW, H - GROUND_Y);
  }
}

function drawPipe(p) {
  // Top pipe (flipped)
  ctx.save();
  ctx.translate(p.x + PIPE_W / 2, p.topH);
  ctx.scale(1, -1);
  if (sheetReady) {
    // Body
    ctx.drawImage(sheet, PIPE.sx, PIPE.sy, PIPE.sw, PIPE.sh - 14,
                  -PIPE_W / 2, 14, PIPE_W, p.topH);
    // Cap
    ctx.drawImage(sheet, PIPE_CAP.sx, PIPE_CAP.sy, PIPE_CAP.sw, PIPE_CAP.sh,
                  -PIPE_CAP.sw / 2, 0, PIPE_CAP.sw, PIPE_CAP.sh);
  } else {
    ctx.fillStyle = '#5ea320';
    ctx.fillRect(-PIPE_W/2, 14, PIPE_W, p.topH - 14);
    ctx.fillStyle = '#73c739';
    ctx.fillRect(-PIPE_W/2 - 3, 0, PIPE_W + 6, 16);
  }
  ctx.restore();

  // Bottom pipe
  const botY = p.topH + PIPE_GAP;
  const botH = GROUND_Y - botY;
  if (sheetReady) {
    // Cap
    ctx.drawImage(sheet, PIPE_CAP.sx, PIPE_CAP.sy, PIPE_CAP.sw, PIPE_CAP.sh,
                  p.x - (PIPE_CAP.sw - PIPE_W) / 2, botY, PIPE_CAP.sw, PIPE_CAP.sh);
    // Body
    ctx.drawImage(sheet, PIPE.sx, PIPE.sy + 14, PIPE.sw, PIPE.sh - 14,
                  p.x, botY + PIPE_CAP.sh, PIPE_W, botH - PIPE_CAP.sh);
  } else {
    ctx.fillStyle = '#73c739';
    ctx.fillRect(p.x - 3, botY, PIPE_W + 6, 16);
    ctx.fillStyle = '#5ea320';
    ctx.fillRect(p.x, botY + 16, PIPE_W, botH - 16);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x + bird.w / 2, bird.y + bird.h / 2);
  ctx.rotate(bird.rot * Math.PI / 180);

  if (sheetReady) {
    // Use the bird from the sprite sheet
    // The 3 wing positions - offset the sy slightly per frame
    const frameOffsets = [0, 0, 0]; // same sprite, we just use it
    // Bird in score area: x=244, y=60, size 17x12 (small) - use the larger menu bird
    // Menu bird at x=228, y=120 size 34x24
    const birdFrameY = [120, 124, 120][frame]; // slight y variation for wing flap illusion
    ctx.drawImage(sheet, 228, birdFrameY, 34, 24,
                  -bird.w/2, -bird.h/2, bird.w, bird.h);
  } else {
    // Fallback: draw a yellow circle bird
    ctx.fillStyle = '#f4d03f';
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.w/2, bird.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(8, -4, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(10, -4, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(12,2); ctx.lineTo(22,5); ctx.lineTo(12,9);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawScore() {
  ctx.fillStyle = 'white';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = 'bold 36px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.strokeText(score, W/2, 60);
  ctx.fillText(score, W/2, 60);
}

function drawUI() {
  if (state === 'waiting') {
    ctx.fillStyle = 'white';
    ctx.strokeStyle = '#5c3a1e';
    ctx.lineWidth = 2;
    ctx.font = 'bold 32px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.strokeText('FLAPPY BIRD', W/2, H/2 - 40);
    ctx.fillText('FLAPPY BIRD', W/2, H/2 - 40);
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillStyle = 'white';
    ctx.strokeText('TAP or SPACE to start', W/2, H/2 + 10);
    ctx.fillText('TAP or SPACE to start', W/2, H/2 + 10);
  }

  if (state === 'dead') {
    // Semi-transparent panel
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(W/2-120, H/2-70, 240, 130);
    ctx.strokeStyle = '#d4a849';
    ctx.lineWidth = 3;
    ctx.strokeRect(W/2-120, H/2-70, 240, 130);

    ctx.fillStyle = '#ffeb3b';
    ctx.strokeStyle = '#7b5800';
    ctx.lineWidth = 2;
    ctx.font = 'bold 28px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.strokeText('GAME OVER', W/2, H/2 - 25);
    ctx.fillText('GAME OVER', W/2, H/2 - 25);

    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.fillStyle = 'white';
    ctx.fillText('Score: ' + score, W/2, H/2 + 15);

    ctx.font = '13px "Courier New", monospace';
    ctx.fillStyle = '#ccc';
    ctx.fillText('Tap to restart', W/2, H/2 + 48);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBg();
  pipes.forEach(drawPipe);
  drawBird();
  drawGround();
  drawScore();
  drawUI();
}

// ── Start ──────────────────────────────────────────────────────────────────────
init();
requestAnimationFrame(loop);
</script>
</body>
</html>
