<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flippy Wings</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- REMOVED INLINE STYLES (moved to css/style.css) -->
<style>/* legacy placeholder — keep tag so replace below targets it cleanly */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Arial Black', Arial, sans-serif;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: pointer;
}

/* ── UI overlay ── */
#ui {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
}
#overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  pointer-events: all;
}
#overlay.hidden { display: none; }

/* Title */
#gameTitle {
  color: #fff;
  font-size: 36px;
  font-weight: 900;
  text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  letter-spacing: 3px;
  text-align: center;
  animation: titleBob 2s ease-in-out infinite;
}
@keyframes titleBob {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Game Over */
#gameOverText {
  color: #FF3B30;
  font-size: 44px;
  font-weight: 900;
  text-shadow: 3px 3px 0 #000;
  letter-spacing: 2px;
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* Score board */
#scoreBoard {
  background: rgba(0,0,0,0.7);
  border: 3px solid #f5a623;
  border-radius: 18px;
  padding: 16px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  backdrop-filter: blur(4px);
}
.sb-row {
  display: flex;
  justify-content: space-between;
  width: 200px;
  font-size: 18px;
  color: #fff;
  text-shadow: 1px 1px 0 #000;
}
.sb-row span:last-child { color: #FFD700; }

/* Buttons */
#startBtn {
  background: linear-gradient(to bottom, #f5a623, #e08c10);
  color: #fff;
  border: none;
  border-radius: 30px;
  padding: 14px 52px;
  font-size: 22px;
  font-family: 'Arial Black', Arial, sans-serif;
  font-weight: 900;
  letter-spacing: 1px;
  cursor: pointer;
  box-shadow: 0 6px 0 #a05e00, 0 8px 20px rgba(0,0,0,0.5);
  transition: transform 0.1s, box-shadow 0.1s;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
#startBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #a05e00; }
#startBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a05e00; }

#tapsHint {
  color: rgba(255,255,255,0.9);
  font-size: 14px;
  text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px;
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* Pause overlay button */
#pauseBtn {
  position: absolute;
  top: 12px; left: 12px;
  background: rgba(0,0,0,0.55);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 10px;
  color: #fff;
  font-size: 20px;
  padding: 6px 12px;
  cursor: pointer;
  pointer-events: all;
  transition: background 0.15s;
}
#pauseBtn:hover { background: rgba(0,0,0,0.8); }

/* Coin HUD top-right */
#coinHUD {
  position: absolute;
  top: 10px; right: 12px;
  color: #FFD700;
  font-size: 16px;
  font-weight: 900;
  text-shadow: 1px 1px 0 #000, 0 0 8px rgba(255,215,0,0.6);
  pointer-events: none;
}

.hidden { display: none !important; }

/* Start screen: overlay fills ui so button sits below image */
#overlay.start-mode {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  justify-content: flex-start;
}
#overlay.start-mode #startBtn {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">
  <!-- Pause button shown during play -->
  <button id="pauseBtn" class="hidden">⏸</button>
  <!-- Coin counter during play -->
  <div id="coinHUD" class="hidden">🪙 0</div>

  <div id="overlay">
    <div id="gameTitle" class="hidden">FLIPPY WINGS</div>
    <div id="gameOverText" class="hidden">GAME OVER</div>
    <div id="scoreBoard" class="hidden">
      <div class="sb-row"><span>SCORE</span><span id="sbScore">0</span></div>
      <div class="sb-row"><span>BEST</span>  <span id="sbBest">0</span></div>
      <div class="sb-row"><span>COINS</span> <span id="sbCoins">0</span></div>
      <div class="sb-row"><span>WALLET</span><span id="sbTotal">0</span></div>
    </div>
    <button id="startBtn">START</button>
    <div id="tapsHint" class="hidden">TAP / SPACE to fly</div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/assets.js"></script>
<script src="js/background.js"></script>
<script src="js/bird.js"></script>
<script src="js/effects.js"></script>
<script src="js/coins.js"></script>
<script src="js/pipes.js"></script>
<script src="js/rockets.js"></script>
<script src="js/hud.js"></script>
<script src="js/ui.js"></script>
<script src="js/input.js"></script>
<script src="js/game.js"></script>
</body>
</html>
</html>
